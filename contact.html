<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Joseph Sanders</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glass Card Container */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Section */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), #3b82f6);
            margin: 0 auto 20px;
            border: 4px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 { font-size: 1.8rem; margin-bottom: 8px; letter-spacing: -0.5px; }
        p.subtitle { color: #94a3b8; margin-bottom: 30px; font-size: 0.95rem; }

        /* Contact Grid/Links */
        .links-container {
            display: grid;
            gap: 12px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 14px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
            border-color: var(--primary);
        }

        .link-item i { margin-right: 15px; color: var(--primary); }
        .link-text { flex-grow: 1; text-align: left; font-weight: 500; }

        /* V-Card Download Button */
        .save-btn {
            margin-top: 30px;
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .save-btn:active { transform: scale(0.95); }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .card { padding: 30px 20px; border-radius: 0; background: transparent; border: none; box-shadow: none; }
            body { align-items: flex-start; background: #0f172a; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img">
            <i data-lucide="user" size="48"></i>
        </div>

        <h1>Joseph Sanders</h1>
        <p class="subtitle">C-Shift Team Lead / EMS Dispatcher</p>

        <div class="links-container">
            <a href="tel:(864) 791-7911" class="link-item">
                <i data-lucide="phone"></i>
                <span class="link-text">Personal Number</span>
            </a>
        <div class="links-container">
            <a href="tel:(821)777-1158" class="link-item">
                <i data-lucide="phone"></i>
                <span class="link-text">Work Number</span>
            </a>            

            <a href="mailto:sndjy1986@gmail.com" class="link-item">
                <i data-lucide="mail"></i>
                <span class="link-text">Email Me</span>
            </a>

            <a href="https://sndjy.us" target="_blank" class="link-item">
                <i data-lucide="globe"></i>
                <span class="link-text">Visit Website</span>
            </a>

            <a href="https://github.com/sndjy1986" target="_blank" class="link-item">
                <i data-lucide="github"></i>
                <span class="link-text">GitHub Profile</span>
            </a>

            <a href="https://www.linkedin.com/in/joey-sanders-272565148/" target="_blank" class="link-item">
                <i data-lucide="linkedin"></i>
                <span class="link-text">LinkedIn</span>
            </a>
            <a href="https://www.facebook.com/sndjy" target="_blank" class="link-item">
                <i data-lucide="Facebook"></i>
                <span class="link-text">Facebook</span>
            </a>            
        </div>

        <a href="#" class="save-btn" onclick="generateVCard()">
            <i data-lucide="download"></i>
            Save Contact
        </a>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Optional: Simple V-Card Generator
        function generateVCard() {
            const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:[YOUR NAME]\nTEL:[YOUR PHONE]\nEMAIL:[YOUR EMAIL]\nURL:https://[YOUR WEBSITE]\nEND:VCARD";
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const newLink = document.createElement("a");
            newLink.download = "JosephSanders.vcf";
            newLink.href = url;
            newLink.click();
        }
    </script>
</body>
</html>
