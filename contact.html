<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact Joseph Sanders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
        }

        .card {
            background: var(--card);
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            text-align: center;
            padding-bottom: 30px;
        }

        .header-bg {
            height: 80px;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }

        .profile-section {
            margin-top: -50px;
            padding: 0 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #cbd5e1;
            border: 4px solid var(--card);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #475569;
        }

        h1 { margin: 15px 0 5px; font-size: 1.6rem; }
        .title { color: var(--primary); font-weight: 600; margin-bottom: 5px; }
        .address { font-size: 0.85rem; color: var(--secondary); margin-bottom: 20px; }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 20px;
            margin-bottom: 25px;
        }

        .contact-item {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.2s;
        }

        .contact-item i { color: var(--primary); margin-bottom: 5px; font-size: 1.1rem; }
        .contact-item:active { background: #e2e8f0; }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .social-link {
            font-size: 1.5rem;
            color: var(--secondary);
            transition: color 0.2s;
        }

        .btn-save {
            display: block;
            margin: 0 20px;
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .label { font-size: 0.7rem; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-bg"></div>
        
        <div class="profile-section">
            <div class="avatar">JS</div>
            <h1>Joseph Sanders</h1>
            <div class="title">Dispatch & Logistics Specialist</div>
            <div class="address"><i class="fas fa-location-dot"></i> Anderson, South Carolina</div>
        </div>

        <div class="social-row">
            <a href="https://facebook.com/YOUR_USER" class="social-link"><i class="fab fa-facebook"></i></a>
            <a href="https://linkedin.com/in/YOUR_USER" class="social-link"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/YOUR_USER" class="social-link"><i class="fab fa-github"></i></a>
        </div>

        <div class="contact-grid">
            <a href="tel:YOUR_PHONE" class="contact-item">
                <i class="fas fa-mobile-screen"></i>
                <span class="label">Personal</span>
                <span>Cell Phone</span>
            </a>
            <a href="tel:YOUR_WORK_PHONE" class="contact-item">
                <i class="fas fa-phone-office"></i>
                <span class="label">Work</span>
                <span>Office Line</span>
            </a>
            <a href="mailto:joey@sndjy.us" class="contact-item">
                <i class="fas fa-envelope"></i>
                <span class="label">Personal</span>
                <span>Email</span>
            </a>
            <a href="mailto:WORK_EMAIL@HERE.com" class="contact-item">
                <i class="fas fa-briefcase"></i>
                <span class="label">Work</span>
                <span>Email</span>
            </a>
        </div>

        <a href="contact.vcf" class="btn-save">
            <i class="fas fa-user-plus"></i> ADD TO CONTACTS
        </a>
    </div>

</body>
</html>
