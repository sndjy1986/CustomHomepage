<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Joseph Sanders</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Elaborate Profile Image Styling */
        .profile-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--glass-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
        }

        .profile-ring {
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 2px dashed var(--primary);
            animation: rotate 10s linear infinite;
            opacity: 0.5;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 { font-size: 1.8rem; margin-bottom: 8px; letter-spacing: -0.5px; }
        p.subtitle { color: #94a3b8; margin-bottom: 30px; font-size: 0.95rem; }

        .links-container {
            display: grid;
            gap: 12px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 14px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
            border-color: var(--primary);
        }

        .link-item i { margin-right: 15px; color: var(--primary); }
        .link-text { flex-grow: 1; text-align: left; font-weight: 500; }

        .save-btn {
            margin-top: 30px;
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: transform 0.2s;
            cursor: pointer;
            border: none;
        }

        .save-btn:active { transform: scale(0.95); }

        @media (max-width: 480px) {
            body { align-items: flex-start; background: #0f172a; }
            .card { padding: 30px 20px; border-radius: 0; background: transparent; border: none; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-container">
            <div class="profile-ring"></div>
            <img src="profile.jpg" alt="Joseph Sanders" class="profile-img">
        </div>

        <h1>Joseph Sanders</h1>
        <p class="subtitle">C-Shift Team Lead / EMS Dispatcher</p>

        <div class="links-container">
            <a href="tel:8647917911" class="link-item">
                <i data-lucide="phone"></i>
                <span class="link-text">Personal Number</span>
            </a>

            <a href="tel:8217771158" class="link-item">
                <i data-lucide="phone-forwarded"></i>
                <span class="link-text">Work Number</span>
            </a>            

            <a href="mailto:sndjy1986@gmail.com" class="link-item">
                <i data-lucide="mail"></i>
                <span class="link-text">Email Me</span>
            </a>

            <a href="https://sndjy.us" target="_blank" class="link-item">
                <i data-lucide="globe"></i>
                <span class="link-text">Visit Website</span>
            </a>

            <a href="https://github.com/sndjy1986" target="_blank" class="link-item">
                <i data-lucide="github"></i>
                <span class="link-text">GitHub Profile</span>
            </a>

            <a href="https://www.linkedin.com/in/joey-sanders-272565148/" target="_blank" class="link-item">
                <i data-lucide="linkedin"></i>
                <span class="link-text">LinkedIn</span>
            </a>

            <a href="https://www.facebook.com/sndjy" target="_blank" class="link-item">
                <i data-lucide="facebook"></i>
                <span class="link-text">Facebook</span>
            </a>            
        </div>

        <button class="save-btn" onclick="generateVCard()">
            <i data-lucide="download"></i>
            Save Contact
        </button>
    </div>

    <script>
        lucide.createIcons();

        function generateVCard() {
            const vcard = "BEGIN:VCARD\n" +
                          "VERSION:3.0\n" +
                          "FN:Joseph Sanders\n" +
                          "TITLE:C-Shift Team Lead / EMS Dispatcher\n" +
                          "TEL;TYPE=CELL:(864) 791-7911\n" +
                          "TEL;TYPE=WORK:(821) 777-1158\n" +
                          "EMAIL:sndjy1986@gmail.com\n" +
                          "URL:https://sndjy.us\n" +
                          "END:VCARD";
            
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const newLink = document.createElement("a");
            newLink.download = "Joseph_Sanders.vcf";
            newLink.href = url;
            newLink.click();
        }
    </script>
</body>
</html>
